name: Evolution Benchmarks

on:
  pull_request:
    paths:
      - 'benchmarks/**'
      - 'champions/**'
      - 'core/**'
      - 'tools/**'
  push:
    branches:
      - master

jobs:
  verify-champions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -e .
      - name: Verify Champions
        run: python3 tools/verify_all_champions.py
      - name: Upload verification results
        # The fresh verify_*.json results are the only record of what THIS
        # environment computed - essential when a champion fails to reproduce
        # (e.g. cross-environment float divergence) and the recorded champion
        # needs to be re-baselined to the CI-canonical values.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: champion-verification-results
          path: verify_*.json
          if-no-files-found: ignore

  benchmark-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -e .
      - name: Run Tank Benchmark (determinism check)
        run: python benchmarks/tank/survival_5k.py --verify-determinism
      - name: Run Soccer Benchmark (determinism check)
        run: python benchmarks/soccer/training_5k.py --verify-determinism

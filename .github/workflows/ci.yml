name: CI

on:
  push:
    branches: [ main, master, develop, claude/** ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 8 * * *'

jobs:
  smoke-gate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check for compiled Python artifacts
      run: |
        if find backend/ core/ -name "__pycache__" -type d 2>/dev/null | grep -q .; then
          echo "ERROR: __pycache__ directories found in backend/ or core/"
          find backend/ core/ -name "__pycache__" -type d
          exit 1
        fi
        if find backend/ core/ -name "*.pyc" 2>/dev/null | grep -q .; then
          echo "ERROR: .pyc files found in backend/ or core/"
          find backend/ core/ -name "*.pyc"
          exit 1
        fi
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run named smoke gate
      env:
        TANK_ENFORCE_MUTATION_INVARIANTS: "1"
      run: python tools/smoke_gate.py

  pre-pr-gate:
    runs-on: ubuntu-latest
    needs: smoke-gate
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run named pre-PR gate
      env:
        TANK_ENFORCE_MUTATION_INVARIANTS: "1"
      run: python tools/pre_pr_gate.py
    - name: Type check with mypy
      run: python -m mypy core/

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend
    - name: Lint frontend
      run: npm run lint
      working-directory: frontend
    - name: Build frontend
      run: npm run build
      working-directory: frontend
    - name: Test frontend
      run: npm run test
      working-directory: frontend

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install project and pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pip-audit
    - name: Audit Python dependencies
      # --skip-editable excludes the local tankworld package itself;
      # everything else installed (direct + transitive) is checked against
      # known-vulnerability databases.
      run: pip-audit --skip-editable
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend
    - name: Audit frontend dependencies
      # Fail only on high/critical so the gate stays actionable; low/moderate
      # advisories are visible in the log without blocking unrelated PRs.
      run: npm audit --audit-level=high
      working-directory: frontend

  nightly-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'full-test')
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run named full validation gate
      env:
        TANK_ENFORCE_MUTATION_INVARIANTS: "1"
      run: python tools/full_gate.py
    - name: Enforce coverage floor
      run: |
        pytest tests/ -m "not slow and not integration and not manual" \
          --cov=core --cov=backend --cov-fail-under=70 -q
    - name: Upload champion verification results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nightly-champion-verification-results
        path: |
          verify_*.json
          verify_*.jsonl
        if-no-files-found: ignore
